name: Auto Create PR

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if a PR already exists for this branch
            const { data: existingPRs } = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${branch}`,
              state: 'open',
            });

            if (existingPRs.length > 0) {
              console.log(`PR already exists for branch "${branch}": #${existingPRs[0].number}`);
              return;
            }

            // Determine the default branch to use as the base
            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const baseBranch = repoData.default_branch;

            // Extract issue number from branch name (e.g. "123-my-feature", "feature/123-desc", "issue/123")
            const issueMatch = branch.match(/(?:^|[\/\-])(\d+)(?:[\/\-]|$)/);
            const issueNumber = issueMatch ? issueMatch[1] : null;
            const issueRef = issueNumber ? `\n\nCloses #${issueNumber}` : '';

            // Create the PR
            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title: branch,
              head: branch,
              base: baseBranch,
              body: `Automated PR for branch \`${branch}\`.${issueRef}`,
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
