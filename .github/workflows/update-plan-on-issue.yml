name: Update Plan on New Issue

on:
  issues:
    types:
      - opened

jobs:
  update-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      models: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate steps and update PLAN.md
        id: update-plan
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');

            const issueNumber = context.payload.issue.number;
            const issueTitle  = context.payload.issue.title;
            const issueBody   = context.payload.issue.body || '';

            // ── 1. Call GitHub Models API ──────────────────────────────────────
            const response = await fetch(
              'https://models.inference.ai.azure.com/chat/completions',
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                },
                body: JSON.stringify({
                  model: 'gpt-4o-mini',
                  messages: [
                    {
                      role: 'system',
                      content:
                        'You are a helpful assistant that generates clear, actionable implementation steps for GitHub issues. ' +
                        'Given an issue title and description, produce a numbered list of concrete technical steps to resolve the issue. ' +
                        'Be concise. Output only the markdown numbered list — no preamble, no conclusion.',
                    },
                    {
                      role: 'user',
                      content: `Issue #${issueNumber}: ${issueTitle}\n\n${issueBody}`,
                    },
                  ],
                  max_tokens: 1000,
                }),
              }
            );

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`GitHub Models API error ${response.status}: ${text}`);
            }

            const data  = await response.json();
            if (!data.choices || data.choices.length === 0) {
              throw new Error('GitHub Models API returned no choices in the response.');
            }
            const steps = data.choices[0].message.content.trim();

            // ── 2. Read (or initialise) PLAN.md ───────────────────────────────
            const planPath = 'PLAN.md';
            let planContent = fs.existsSync(planPath)
              ? fs.readFileSync(planPath, 'utf8')
              : '# SMBPlayers – Issue Resolution Plan\n\nThis document outlines the plan to resolve open issues in this repository.\n';

            // Skip if a section for this issue already exists
            const sectionAnchor = `## Issue #${issueNumber}`;
            if (planContent.includes(sectionAnchor)) {
              console.log(`PLAN.md already contains a section for issue #${issueNumber}. Skipping.`);
              core.setOutput('changed', 'false');
              return;
            }

            // ── 3. Append new section ─────────────────────────────────────────
            const newSection =
              `\n---\n\n## Issue #${issueNumber} – ${issueTitle}\n\n### Steps\n\n${steps}\n`;
            fs.writeFileSync(planPath, planContent + newSection);
            console.log(`Updated PLAN.md with steps for issue #${issueNumber}.`);
            core.setOutput('changed', 'true');

      - name: Commit and push PLAN.md
        if: steps.update-plan.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PLAN.md
          git diff --staged --quiet \
            || git commit -m "docs: update PLAN.md with steps for issue #${{ github.event.issue.number }}"
          git push
