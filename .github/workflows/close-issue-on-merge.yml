name: Close Issue on PR Merge

on:
  pull_request:
    types:
      - closed

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Close linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Match issue references: closes/fixes/resolves #N (case-insensitive)
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;

            function extractIssueNumbers(text) {
              const numbers = new Set();
              let match;
              pattern.lastIndex = 0;
              while ((match = pattern.exec(text)) !== null) {
                numbers.add(parseInt(match[1], 10));
              }
              return numbers;
            }

            // Collect issue numbers from the PR body
            const body = context.payload.pull_request.body || '';
            const issueNumbers = extractIssueNumbers(body);

            // Also scan all commit messages in the PR
            const { data: commits } = await github.rest.pulls.listCommits({
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });
            for (const { commit } of commits) {
              for (const n of extractIssueNumbers(commit.message)) {
                issueNumbers.add(n);
              }
            }

            if (issueNumbers.size === 0) {
              console.log('No linked issues found in PR body or commit messages.');
              return;
            }

            for (const issueNumber of issueNumbers) {
              try {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'completed',
                });
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `Closed by PR #${prNumber}.`,
                });
                console.log(`Closed issue #${issueNumber}`);
              } catch (error) {
                console.error(`Failed to close issue #${issueNumber}: ${error.message}`);
              }
            }
